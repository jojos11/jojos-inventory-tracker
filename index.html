<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#A2CCEB;--bg:#1A1A1A;--card:#242424;--border:#333;--gray:#999;--gray2:#666;--green:#4CAF50;--yellow:#FFB300;--red:#EF5350;--orange:#FF9800}
body{background:var(--bg);color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh}
input,select,textarea,button{font-family:'DM Sans',sans-serif}
.serif{font-family:'Playfair Display',serif}

/* Header */
header{background:var(--card);border-bottom:2px solid var(--blue);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-logo{height:36px;object-fit:contain}
.nav{display:flex;gap:2px;background:var(--bg);border-radius:8px;padding:3px}
.nav button{padding:7px 12px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:transparent;color:var(--gray);transition:all .15s;white-space:nowrap}
.nav button.active{background:var(--blue);color:#000}
.loc-toggle{display:flex;gap:2px;background:var(--bg);border-radius:6px;padding:2px;border:1px solid var(--border)}
.loc-toggle button{padding:6px 12px;border-radius:5px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:transparent;color:var(--gray)}
.loc-toggle button.active{background:var(--blue);color:#000}

/* Layout */
main{padding:20px;max-width:1200px;margin:0 auto}
.stats{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.stat{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:14px 18px;flex:1;min-width:120px}
.stat-val{font-size:24px;font-weight:700;font-family:'Playfair Display',serif}
.stat-lbl{font-size:11px;color:var(--gray);margin-top:2px}
.card{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:18px;margin-bottom:14px}
.card h3{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card .sub{font-size:12px;color:var(--gray);margin:4px 0 12px}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border)}
th.c{text-align:center}
td{padding:7px 12px;border-bottom:1px solid rgba(51,51,51,.15)}
td.c{text-align:center}

/* Components */
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0;margin-right:7px}
.tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.5px;margin-left:6px}
.btn{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-blue{background:var(--blue);color:#000}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--gray)}
.btn-outline:hover{border-color:var(--gray)}
.bar-wrap{display:flex;align-items:center;gap:5px}
.bar{width:50px;height:4px;border-radius:2px;background:#333;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .3s}
.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;padding:10px 12px 4px}
.input{width:52px;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:5px 6px;color:#fff;font-size:13px;text-align:center}
.input:focus{border-color:var(--blue);outline:none}
.input-wide{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:8px 12px;color:#fff;font-size:13px}
.input-wide:focus{border-color:var(--blue);outline:none}
.select{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:8px 12px;color:#fff;font-size:13px;width:100%}
.select:focus{border-color:var(--blue);outline:none}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.modal{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:24px;max-width:520px;width:90%;max-height:85vh;overflow-y:auto}
.alert{padding:10px 14px;border-radius:8px;margin-bottom:8px;font-size:13px;display:flex;align-items:center;gap:8px}
.alert-critical{background:rgba(239,83,80,.12);border:1px solid rgba(239,83,80,.25);color:var(--red)}
.alert-warning{background:rgba(255,179,0,.1);border:1px solid rgba(255,179,0,.2);color:var(--yellow)}
.alert-transfer{background:rgba(162,204,235,.1);border:1px solid rgba(162,204,235,.2);color:var(--blue)}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-box{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:40px;text-align:center;width:360px}
.login-logo{width:120px;height:120px;border-radius:50%;object-fit:cover;margin-bottom:20px;border:3px solid var(--blue)}

/* Responsive */
@media(max-width:900px){
  header{flex-direction:column;gap:8px;padding:10px 14px}
  .nav{flex-wrap:wrap;justify-content:center}
  .header-logo{height:28px}
}
@media(max-width:600px){
  .stats{flex-direction:column}
  .stat{min-width:auto}
  main{padding:12px}
  .nav button{font-size:10px;padding:6px 8px}
}
</style>
</head>

const { useState, useEffect, useCallback } = React;

// ─── API HELPER ──────────────────────────
let AUTH_TOKEN = null;
const api = async (endpoint, body = {}) => {
  const r = await fetch(`/api/${endpoint}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${AUTH_TOKEN}` },
    body: JSON.stringify(body)
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  return d;
};
const db = (table, action, opts = {}) => api('db', { table, action, ...opts });

// ─── HELPERS ──────────────────────────────
const sColor = (cur, par) => !par ? '#666' : cur/par >= .7 ? 'var(--green)' : cur/par >= .4 ? 'var(--yellow)' : 'var(--red)';
const Dot = ({color}) => <span className="dot" style={{background:color}}/>;
const Tag = ({children,color}) => <span className="tag" style={{background:(color||'var(--blue)')+'20',color:color||'var(--blue)'}}>{children}</span>;
const Bar = ({pct,color}) => (
  <div className="bar-wrap">
    <div className="bar"><div className="bar-fill" style={{width:`${Math.min(pct,100)}%`,background:color}}/></div>
    <span style={{fontSize:11,color,fontWeight:600,minWidth:32}}>{Math.round(pct)}%</span>
  </div>
);
const Stat = ({value,label,color}) => (
  <div className="stat">
    <div className="stat-val" style={{color:color||'#fff'}}>{value}</div>
    <div className="stat-lbl">{label}</div>
  </div>
);

// ─── LOGIN SCREEN ─────────────────────────
function LoginScreen({onLogin}) {
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);
  const tryLogin = async () => {
    setLoading(true); setErr('');
    AUTH_TOKEN = pw;
    try {
      await db('flavors', 'select', { limit: 1 });
      localStorage.setItem('jojo_inv_token', pw);
      onLogin();
    } catch(e) { setErr('Invalid password'); AUTH_TOKEN = null; }
    setLoading(false);
  };
  return (
    <div className="login-wrap">
      <div className="login-box">
        <img src={CIRCLE_LOGO} alt="JoJo's Cookie Co." className="login-logo" />
        <h2 className="serif" style={{fontSize:22,marginBottom:4}}>Inventory Tracker</h2>
        <p style={{color:'var(--gray)',fontSize:13,marginBottom:24}}>JoJo's Cookie Co. — Petoskey & Traverse City</p>
        <input className="input-wide" type="password" placeholder="Enter password" value={pw}
          onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&tryLogin()}
          style={{marginBottom:12,textAlign:'center'}} autoFocus />
        {err && <p style={{color:'var(--red)',fontSize:12,marginBottom:8}}>{err}</p>}
        <button className="btn btn-blue" onClick={tryLogin} disabled={loading}
          style={{width:'100%',padding:'10px',fontSize:14}}>{loading?'Checking...':'Sign In'}</button>
      </div>
    </div>
  );
}

// ─── INITIAL SETUP ────────────────────────
function InitialSetup({flavors, onComplete}) {
  const [counts, setCounts] = useState({});
  const [saving, setSaving] = useState(false);
  const save = async () => {
    setSaving(true);
    const today = new Date().toISOString().split('T')[0];
    for (const f of flavors) {
      const petBins = parseFloat(counts[`${f.id}_pet`] || 0);
      const tcBins = parseFloat(counts[`${f.id}_tc`] || 0);
      if (petBins > 0) await db('inventory_snapshots','insert',{data:{flavor_id:f.id,location_id:1,date:today,actual_bins:petBins,calculated_bins:petBins,counted_by:'initial'}});
      if (tcBins > 0) await db('inventory_snapshots','insert',{data:{flavor_id:f.id,location_id:2,date:today,actual_bins:tcBins,calculated_bins:tcBins,counted_by:'initial'}});
    }
    setSaving(false);
    onComplete();
  };
  const classics = flavors.filter(f=>f.type==='classic');
  const specs = flavors.filter(f=>f.type==='specialty');
  const extras = flavors.filter(f=>f.type==='extra');
  const renderGroup = (list, label, color) => (
    <>
      <tr><td colSpan={3} className="section-label" style={{color}}>{label}</td></tr>
      {list.map(f => (
        <tr key={f.id}>
          <td style={{fontWeight:500}}>{f.name}</td>
          <td className="c"><input className="input" type="number" step="0.25" value={counts[`${f.id}_pet`]||''} onChange={e=>setCounts({...counts,[`${f.id}_pet`]:e.target.value})} placeholder="0"/></td>
          <td className="c"><input className="input" type="number" step="0.25" value={counts[`${f.id}_tc`]||''} onChange={e=>setCounts({...counts,[`${f.id}_tc`]:e.target.value})} placeholder="0"/></td>
        </tr>
      ))}
    </>
  );
  return (
    <div style={{maxWidth:600,margin:'30px auto',padding:20}}>
      <div className="card">
        <div style={{textAlign:'center',marginBottom:20}}>
          <img src={CIRCLE_LOGO} alt="JoJo's" style={{width:80,height:80,borderRadius:'50%',border:'2px solid var(--blue)',marginBottom:12}} />
          <h2 className="serif">Initial Inventory Setup</h2>
          <p className="sub" style={{marginBottom:0}}>Enter how many dough bins you currently have at each location. This sets your baseline.</p>
        </div>
        <table>
          <thead><tr><th>Flavor</th><th className="c">Petoskey</th><th className="c">TC</th></tr></thead>
          <tbody>
            {renderGroup(classics, 'Classics', 'var(--blue)')}
            {specs.length>0 && renderGroup(specs, 'Monthly Specialties', 'var(--orange)')}
            {extras.length>0 && renderGroup(extras, 'Extras', 'var(--green)')}
          </tbody>
        </table>

}

// ─── DOUGH BINS TAB ───────────────────────
function DoughTab({loc, flavors, dashData}) {
  const [editing, setEditing] = useState(false);
  const [counts, setCounts] = useState({});
  const locId = loc === 'petoskey' ? 1 : 2;
  const locName = loc === 'petoskey' ? 'Petoskey' : 'Traverse City';
  const inv = dashData?.inventory || [];
  const getInv = (fId) => { const item = inv.find(i => i.flavor.id === fId); return item ? (locId === 1 ? item.petoskey : item.tc) : 0; };

  const saveCounts = async () => {
    const today = new Date().toISOString().split('T')[0];
    for (const [fId, bins] of Object.entries(counts)) {
      if (bins !== '') await db('inventory_snapshots', 'upsert', { data: { flavor_id: parseInt(fId), location_id: locId, date: today, actual_bins: parseFloat(bins), counted_by: 'manager' }});
    }
    setEditing(false); setCounts({}); window.location.reload();
  };

  const totalBins = flavors.reduce((s,f) => s + getInv(f.id), 0);
  const belowTrigger = flavors.filter(f => (inv.find(i=>i.flavor.id===f.id)?.total||0) <= parseFloat(f.restock_trigger_bins||3)).length;

  const renderGroup = (list, label, labelColor, tagLabel) => (
    <>
      <tr><td colSpan={6} className="section-label" style={{color:labelColor}}>{label}</td></tr>
      {list.map(f => {
        const bins = editing && counts[f.id] !== undefined ? parseFloat(counts[f.id]) : getInv(f.id);
        const par = parseFloat(f.par_level_bins||6);
        const sc = sColor(bins, par);
        return (
          <tr key={f.id}>
            <td><Dot color={sc}/><span style={{fontWeight:500}}>{f.name}</span>
              {tagLabel && <Tag color={labelColor}>{tagLabel}</Tag>}
              {f.is_stuffed && <Tag color="var(--orange)">STUFFED</Tag>}
            </td>
            <td className="c">{editing ? <input className="input" type="number" step="0.25" value={counts[f.id]!==undefined?counts[f.id]:bins} onChange={e=>setCounts({...counts,[f.id]:e.target.value})}/> : bins}</td>
            <td className="c" style={{color:'var(--gray)'}}>{par}</td>
            <td className="c" style={{color:'var(--gray)'}}>{f.restock_trigger_bins||3}</td>
            <td><Bar pct={bins/par*100} color={sc}/></td>
            <td className="c" style={{fontSize:12,color:'var(--gray)'}}>~{Math.round(bins*(f.bin_capacity_cookies||80))}</td>
          </tr>
        );
      })}
    </>
  );
  return (
    <div>
      <div className="stats">
        <Stat value={totalBins.toFixed(1)} label={`Total Bins — ${locName}`}/>
        <Stat value={flavors.length - belowTrigger} label="Above Trigger" color="var(--green)"/>
        <Stat value={belowTrigger} label="Below Trigger" color="var(--red)"/>
      </div>
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div><h3>Dough Bins — {locName}</h3><p className="sub">Unstuffed ~80 / Stuffed ~56 cookies per bin. Calculated from production & sales.</p></div>
          <div style={{display:'flex',gap:8}}>
            {editing ? <><button className="btn btn-outline" onClick={()=>{setEditing(false);setCounts({});}}>Cancel</button><button className="btn btn-green" onClick={saveCounts}>✓ Save</button></>
            : <button className="btn btn-blue" onClick={()=>setEditing(true)}>Spot Check</button>}
          </div>
        </div>
        <table>
          <thead><tr><th>Flavor</th><th className="c">Bins</th><th className="c">Par</th><th className="c">Trigger</th><th>Level</th><th className="c">~Cookies</th></tr></thead>
          <tbody>
            {renderGroup(flavors.filter(f=>f.type==='classic'), 'Classics', 'var(--blue)', null)}
            {flavors.filter(f=>f.type==='specialty').length>0 && renderGroup(flavors.filter(f=>f.type==='specialty'), 'Monthly Specialties', 'var(--orange)', 'MONTHLY')}
            {flavors.filter(f=>f.type==='extra').length>0 && renderGroup(flavors.filter(f=>f.type==='extra'), 'Extras', 'var(--green)', 'EXTRA')}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── PRODUCTION PLAN TAB ──────────────────
function ProductionTab({dashData}) {
  const plan = dashData?.productionPlan || [];
  const alerts = dashData?.alerts || [];
  const needs = plan.filter(p=>p.needsProduction);
  const stocked = plan.filter(p=>!p.needsProduction);
  const totalBatches = needs.reduce((s,p)=>s+p.batches,0);
  const baseSummary = {};
  for (const p of needs) {
    const base = p.flavor.base_dough_id ? `Base ${['','A','B','C','D','F'][p.flavor.base_dough_id]||'?'}` : 'Standalone';
    baseSummary[base] = (baseSummary[base]||0) + p.batches;
  }
  return (
    <div>
      <div className="stats">
        <Stat value={totalBatches} label="Batches to Make"/>
        <Stat value={needs.length} label="Flavors Need Dough" color="var(--orange)"/>
        <Stat value={stocked.length} label="Stocked" color="var(--green)"/>
        <Stat value={alerts.filter(a=>a.type==='critical').length} label="Critical" color="var(--red)"/>
      </div>
      {alerts.length > 0 && <div className="card"><h3>⚠️ Alerts</h3><div style={{marginTop:10}}>{alerts.map((a,i) => <div key={i} className={`alert alert-${a.type}`}>{a.message}</div>)}</div></div>}
      {Object.keys(baseSummary).length > 0 && (
        <div className="card" style={{padding:'14px 18px'}}>
          <h3 style={{fontSize:13,marginBottom:10}}>Base Dough Summary</h3>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {Object.entries(baseSummary).sort((a,b)=>b[1]-a[1]).map(([base,cnt]) => (
              <div key={base} style={{background:'var(--bg)',borderRadius:8,padding:'8px 14px',display:'flex',alignItems:'center',gap:8}}>
                <span className="serif" style={{fontSize:20,fontWeight:700,color:'var(--blue)'}}>{cnt}</span>
                <span style={{fontSize:12,color:'var(--gray)'}}>{cnt===1?'batch':'batches'} of <span style={{color:'#fff',fontWeight:600}}>{base}</span></span>
              </div>
            ))}
          </div>
        </div>
      )}
      <div className="card">
        <h3>Dough Production Plan <Tag>MON + TUE</Tag></h3>
        <p className="sub">Based on current inventory, sales velocity, and upcoming orders.</p>
        {needs.length > 0 ? (
          <table>
            <thead><tr><th>Flavor</th><th className="c">On Hand</th><th className="c">Weekly Use</th><th className="c">End of Week</th><th className="c">Short</th><th className="c">Batches</th></tr></thead>
            <tbody>{needs.map(p => (
              <tr key={p.flavor.id}>
                <td><Dot color={p.batches>=3?'var(--red)':p.batches>=2?'var(--yellow)':'var(--green)'}/><span style={{fontWeight:500}}>{p.flavor.name}</span>
                  {p.tcNeedsTransfer && <Tag color="var(--blue)">TC TRANSFER</Tag>}
                  {p.upcomingDemand > 0 && <Tag color="var(--orange)">+{p.upcomingDemand} order</Tag>}
                </td>
                <td className="c">{p.current}</td>
                <td className="c">{p.weeklyUse}</td>
                <td className="c" style={{color:p.endOfWeek<0?'var(--red)':'var(--gray)'}}>{p.endOfWeek}</td>
                <td className="c" style={{color:'var(--red)',fontWeight:600}}>{p.binsNeeded}</td>
                <td className="c"><span style={{background:'rgba(162,204,235,.15)',color:'var(--blue)',fontWeight:700,padding:'4px 12px',borderRadius:6,fontSize:14}} className="serif">{p.batches}</span></td>
              </tr>
            ))}</tbody>
          </table>
        ) : <p style={{color:'var(--green)',padding:20,textAlign:'center'}}>✓ All flavors stocked — no production needed.</p>}
        {stocked.length > 0 && <div style={{marginTop:14}}><div className="section-label" style={{color:'var(--green)'}}>Stocked</div><div style={{display:'flex',flexWrap:'wrap',gap:6,padding:'0 12px'}}>{stocked.map(p => <span key={p.flavor.id} style={{padding:'4px 10px',borderRadius:6,background:'rgba(76,175,80,.08)',color:'var(--green)',fontSize:12}}>{p.flavor.name} ({p.current})</span>)}</div></div>}
      </div>
    </div>
  );
}

// ─── SYNC ─────────────────────────────────
function SyncTab() {
  const [syncing, setSyncing] = useState(null);
  const [results, setResults] = useState({});
  const syncClover = async () => { setSyncing('clover'); try { const r = await api('clover',{since:new Date(Date.now()-86400000).toISOString()}); setResults(p=>({...p,clover:r.results})); } catch(e) { setResults(p=>({...p,clover:{errors:[e.message]}})); } setSyncing(null); };
  const syncShopify = async () => { setSyncing('shopify'); try { const r = await api('shopify',{since:new Date(Date.now()-86400000).toISOString()}); setResults(p=>({...p,shopify:r.results})); } catch(e) { setResults(p=>({...p,shopify:{errors:[e.message]}})); } setSyncing(null); };
  return (
    <div>
      <div className="card"><h3>Sync Sales Data</h3><p className="sub">Pull latest sales from Clover and Shopify to update inventory.</p>
        <div style={{display:'flex',gap:12,marginTop:16}}>
          <button className="btn btn-green" onClick={syncClover} disabled={syncing} style={{flex:1,padding:12}}>{syncing==='clover'?'Syncing...':'Sync Clover (In-Store)'}</button>
          <button className="btn btn-blue" onClick={syncShopify} disabled={syncing} style={{flex:1,padding:12}}>{syncing==='shopify'?'Syncing...':'Sync Shopify (Online)'}</button>
        </div>
      </div>
      {results.clover && <div className="card"><h3>Clover Results</h3><p style={{fontSize:13,marginTop:8}}>Petoskey: {results.clover.petoskey||0} | TC: {results.clover.tc||0} | Matched: {results.clover.matched||0}</p>{results.clover.unmatched?.length>0&&<p style={{color:'var(--yellow)',fontSize:12,marginTop:4}}>Unmatched: {[...new Set(results.clover.unmatched)].join(', ')}</p>}{results.clover.errors?.length>0&&<p style={{color:'var(--red)',fontSize:12,marginTop:4}}>Errors: {results.clover.errors.join(', ')}</p>}</div>}
      {results.shopify && <div className="card"><h3>Shopify Results</h3><p style={{fontSize:13,marginTop:8}}>Total: {results.shopify.total||0} | Matched: {results.shopify.matched||0}</p>{results.shopify.unmatched?.length>0&&<p style={{color:'var(--yellow)',fontSize:12,marginTop:4}}>Unmatched: {[...new Set(results.shopify.unmatched)].join(', ')}</p>}</div>}
    </div>
  );
}

// ─── SETTINGS ─────────────────────────────
function SettingsTab({flavors, onRefresh}) {
  const [showAdd, setShowAdd] = useState(false);
  const [nf, setNf] = useState({name:'',type:'specialty',base_dough_id:'',is_stuffed:false,par_level_bins:6,restock_trigger_bins:3,month:'',year:2026});
  const [bases, setBases] = useState([]);
  useEffect(() => { db('base_doughs','select').then(d=>setBases(d.data||[])); }, []);
  const addFlavor = async () => {
    if (!nf.name) return;
    await db('flavors','insert',{data:{name:nf.name, type:nf.type, base_dough_id:nf.base_dough_id?parseInt(nf.base_dough_id):null, is_stuffed:nf.is_stuffed, bin_capacity_cookies:nf.is_stuffed?56:80, par_level_bins:parseFloat(nf.par_level_bins), restock_trigger_bins:parseFloat(nf.restock_trigger_bins), batch_size_cookies:300, month:nf.month||null, year:nf.year||null, active:true}});
    setShowAdd(false); setNf({name:'',type:'specialty',base_dough_id:'',is_stuffed:false,par_level_bins:6,restock_trigger_bins:3,month:'',year:2026}); onRefresh();
  };
  const deactivate = async (id) => { if(!confirm('Retire this flavor?'))return; await db('flavors','update',{id,data:{active:false}}); onRefresh(); };
  return (
    <div>
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div><h3>Manage Flavors</h3><p className="sub">Add monthly specialties, retire flavors, adjust settings.</p></div>
          <button className="btn btn-blue" onClick={()=>setShowAdd(true)}>+ Add Flavor</button>
        </div>
        <table><thead><tr><th>Flavor</th><th>Type</th><th className="c">Base</th><th className="c">Stuffed</th><th className="c">Bin Cap</th><th className="c">Par</th><th className="c">Trigger</th><th></th></tr></thead>
        <tbody>{flavors.map(f=>(
          <tr key={f.id}>
            <td style={{fontWeight:500}}>{f.name}</td>
            <td><Tag color={f.type==='classic'?'var(--blue)':f.type==='specialty'?'var(--orange)':'var(--green)'}>{f.type.toUpperCase()}</Tag></td>
            <td className="c">{f.base_dough_id?['','A','B','C','D','F'][f.base_dough_id]||'?':'—'}</td>
            <td className="c">{f.is_stuffed?'✓':'—'}</td>
            <td className="c">{f.bin_capacity_cookies}</td>
            <td className="c">{f.par_level_bins}</td>
            <td className="c">{f.restock_trigger_bins}</td>
            <td className="c">{f.type!=='classic'&&<button className="btn btn-outline" style={{fontSize:10,padding:'2px 6px'}} onClick={()=>deactivate(f.id)}>Retire</button>}</td>
          </tr>
        ))}</tbody></table>
      </div>
      {showAdd && (
        <div className="modal-overlay" onClick={()=>setShowAdd(false)}><div className="modal" onClick={e=>e.stopPropagation()}>
          <h3 className="serif" style={{marginBottom:16}}>Add New Flavor</h3>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <input className="input-wide" placeholder="Flavor name" value={nf.name} onChange={e=>setNf({...nf,name:e.target.value})} autoFocus/>
            <select className="select" value={nf.type} onChange={e=>setNf({...nf,type:e.target.value})}><option value="specialty">Monthly Specialty</option><option value="extra">Extra</option><option value="classic">Classic</option></select>
            <select className="select" value={nf.base_dough_id} onChange={e=>setNf({...nf,base_dough_id:e.target.value})}><option value="">Standalone (no base)</option>{bases.map(b=><option key={b.id} value={b.id}>{b.name} ({b.label})</option>)}</select>
            <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'var(--gray)',cursor:'pointer'}}><input type="checkbox" checked={nf.is_stuffed} onChange={e=>setNf({...nf,is_stuffed:e.target.checked})}/> Stuffed cookie (bins hold ~56 instead of ~80)</label>
            <div style={{display:'flex',gap:8}}><div style={{flex:1}}><label style={{fontSize:11,color:'var(--gray)'}}>Par Level (bins)</label><input className="input-wide" type="number" value={nf.par_level_bins} onChange={e=>setNf({...nf,par_level_bins:e.target.value})}/></div><div style={{flex:1}}><label style={{fontSize:11,color:'var(--gray)'}}>Restock Trigger</label><input className="input-wide" type="number" value={nf.restock_trigger_bins} onChange={e=>setNf({...nf,restock_trigger_bins:e.target.value})}/></div></div>
            {nf.type==='specialty'&&<div style={{display:'flex',gap:8}}><div style={{flex:1}}><label style={{fontSize:11,color:'var(--gray)'}}>Month</label><input className="input-wide" placeholder="April" value={nf.month} onChange={e=>setNf({...nf,month:e.target.value})}/></div><div style={{flex:1}}><label style={{fontSize:11,color:'var(--gray)'}}>Year</label><input className="input-wide" type="number" value={nf.year} onChange={e=>setNf({...nf,year:e.target.value})}/></div></div>}
            <div style={{display:'flex',gap:8,marginTop:6}}><button className="btn btn-outline" style={{flex:1}} onClick={()=>setShowAdd(false)}>Cancel</button><button className="btn btn-green" style={{flex:1}} onClick={addFlavor}>Add Flavor</button></div>
          </div>
        </div></div>
      )}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────
function App() {
  const [authed, setAuthed] = useState(false);
  const [tab, setTab] = useState('production');
  const [loc, setLoc] = useState('petoskey');
  const [flavors, setFlavors] = useState([]);
  const [dashData, setDashData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [needsSetup, setNeedsSetup] = useState(false);

  useEffect(() => { const saved = localStorage.getItem('jojo_inv_token'); if (saved) { AUTH_TOKEN = saved; setAuthed(true); } }, []);

  const loadData = useCallback(async () => {
    setLoading(true);
    try {
      const {data: fl} = await db('flavors','select',{filters:{active:true},orderBy:'type'});
      setFlavors(fl || []);
      const {data: snaps} = await db('inventory_snapshots','select',{limit:1});
      if (!snaps || snaps.length === 0) { setNeedsSetup(true); setLoading(false); return; }
      const dash = await api('dashboard');
      setDashData(dash);
    } catch(e) { console.error('Load error:', e); }
    setLoading(false);
  }, []);

  useEffect(() => { if (authed) loadData(); }, [authed, loadData]);

  if (!authed) return <LoginScreen onLogin={()=>setAuthed(true)}/>;
  if (loading) return <div className="login-wrap"><div style={{textAlign:'center'}}><img src={CIRCLE_LOGO} style={{width:60,height:60,borderRadius:'50%',marginBottom:12,opacity:.7}}/><p style={{color:'var(--gray)'}}>Loading...</p></div></div>;
  if (needsSetup) return <InitialSetup flavors={flavors} onComplete={()=>{setNeedsSetup(false);loadData();}}/>;

  const tabs = [
    {id:'production',label:'Production Plan'},
    {id:'dough',label:'Dough Bins'},
    {id:'orders',label:'Order Lists'},
    {id:'manual',label:'Orders'},
    {id:'log',label:'Log Production'},
    {id:'transfers',label:'Transfers'},
    {id:'sync',label:'Sync'},
    {id:'settings',label:'Settings'},
  ];

  return (
    <div>
      <header>
        <img src={HORIZ_WHITE_LOGO} alt="JoJo's Cookie Co." className="header-logo" />
        <nav className="nav">
          {tabs.map(t => <button key={t.id} className={tab===t.id?'active':''} onClick={()=>setTab(t.id)}>{t.label}</button>)}
        </nav>
        {tab==='dough' ? (
          <div className="loc-toggle">
            <button className={loc==='petoskey'?'active':''} onClick={()=>setLoc('petoskey')}>Petoskey</button>
            <button className={loc==='tc'?'active':''} onClick={()=>setLoc('tc')}>Traverse City</button>
          </div>
        ) : <div style={{width:160}}/>}
      </header>
      <main>
        {tab==='dough' && <DoughTab loc={loc} flavors={flavors} dashData={dashData}/>}
        {tab==='production' && <ProductionTab dashData={dashData}/>}
        {tab==='orders' && <OrdersTab dashData={dashData}/>}
        {tab==='manual' && <ManualOrdersTab flavors={flavors}/>}
        {tab==='log' && <LogProductionTab flavors={flavors}/>}
        {tab==='transfers' && <TransfersTab flavors={flavors}/>}
        {tab==='sync' && <SyncTab/>}
        {tab==='settings' && <SettingsTab flavors={flavors} onRefresh={loadData}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
